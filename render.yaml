services:
  - type: web
    name: investing-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: investing-bot-db
          property: connectionString

databases:
  - name: investing-bot-db
    plan: free
